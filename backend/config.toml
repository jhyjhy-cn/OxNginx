[server]
# 服务器端口 默认：9000
port = 9000
# 服务器主机 默认：0.0.0.0
host = "0.0.0.0"

[database]
# 数据库路径
path = ""

[nginx]
# nginx 二进制文件路径
bin = ""
# nginx 配置文件路径
config = ""
# nginx 站点启用目录路径
sites_enabled = ""

[acme]
# acme.sh 二进制文件路径
bin = ""

[auth]
# Token 过期时间（小时）默认：1
token_expires_hours = 1

[log]
# 日志级别：trace / debug / info / warn / error
level = "debug"
# 单个日志文件最大大小（MB），超过后自动轮转为 panel-时间.log
max_size_mb = 10
